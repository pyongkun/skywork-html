<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Skywork AI에서 생성한 HTML 파일 목록</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f8fafc;
      color: #111827;
    }

    h1 {
      margin-bottom: 8px;
    }

    .description {
      color: #6b7280;
      margin-bottom: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
    }

    .card a {
      font-size: 18px;
      font-weight: bold;
      color: #2563eb;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    .filename {
      margin-top: 6px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>HTML 파일 목록</h1>
  <p class="description">
    아래 링크를 클릭하면 각 HTML 파일을 열 수 있습니다.
  </p>

  <div class="card">
    <a href="report1.html">mcp_developer_guide 열기</a>
    <div class="filename">mcp_developer_guide.html</div>
  </div>

  <div class="card">
    <a href="report2.html">llm_deep_learning_acceleration_report 열기</a>
    <div class="filename">llm_deep_learning_acceleration_report.html</div>
  </div>

  <div class="card">
    <a href="report3.html">cctv_video_analytics_report 열기</a>
    <div class="filename">cctv_video_analytics_report</div>
  </div>
</body>
</html>
